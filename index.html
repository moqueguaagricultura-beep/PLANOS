<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLANOS DXF_EDC</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="map"></div>
    
    <!-- Top Bar -->
    <header class="top-bar">
        <h1>PLANOS DXF_EDC</h1>
        <div class="top-bar-actions">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar texto...">
                <button id="btn-search" title="Buscar">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <label for="dxf-upload" class="btn-primary">
                <span>Cargar DXF</span>
                <input type="file" id="dxf-upload" accept=".dxf" hidden>
            </label>
        </div>
    </header>

    <!-- Plan Manager Panel -->
    <div id="plan-panel" class="panel hidden">
        <div class="panel-header">
            <h2>Gestor de Planos</h2>
            <button id="close-plans" class="btn-icon">×</button>
        </div>
        <div id="plan-list" class="panel-content">
            <p class="empty-state">No hay planos cargados</p>
        </div>
    </div>

    <!-- Layer Control Panel (Bottom Sheet style for mobile) -->
    <div id="layer-panel" class="panel hidden">
        <div class="panel-header">
            <h2>Capas del DXF</h2>
            <button id="close-layers" class="btn-icon">×</button>
        </div>
        <div id="layer-list" class="panel-content">
            <!-- Layers injected here via JS -->
            <p class="empty-state">No hay capas cargadas</p>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Procesando DXF...</p>
    </div>

    <!-- Tool Controls -->
    <div class="map-controls">
        <button id="btn-basemap-2020" class="fab fab-secondary" title="Diciembre 2020">20</button>
        <button id="btn-basemap" class="fab fab-secondary" title="Satélite">🗺️</button>
        <button id="btn-measure" class="fab fab-secondary" title="Medir Distancia">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
        </button>
        <button id="btn-plans" class="fab fab-secondary" title="Gestor de Planos">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
        </button>
        <button id="btn-layers" class="fab fab-secondary" title="Capas">
            <svg viewBox="0 0 24 24" width="26" height="26" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
        </button>
        <button id="btn-gps" class="fab" title="Mi Ubicación">
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </button>
        <button id="btn-note" class="fab" title="Agregar Nota">📌</button>
    </div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    
    <!-- DXF Parser -->
    <script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.js"></script>

    <!-- Custom Note Modal -->
    <div id="note-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>PLANOS DXF_EDC</h3>
            <p>Escribe tu nota o recordatorio:</p>
            <textarea id="note-text" placeholder="Tu nota aquí..." style="width:100%; height:80px; padding:8px; border-radius:8px; border:1px solid var(--border); margin-bottom:16px; font-family:inherit;"></textarea>
            <div class="modal-actions">
                <button id="note-cancel" class="btn-primary" style="background:#6b7280;">Cancelar</button>
                <button id="note-save" class="btn-primary">Guardar Nota</button>
            </div>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="custom-alert" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="alert-title">PLANOS DXF_EDC</h3>
            <p id="alert-message"></p>
            <button id="alert-ok" class="btn-primary">Aceptar</button>
        </div>
    </div>

    <!-- Center Crosshair for Mobile -->
    <div id="center-crosshair" class="hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:2000; pointer-events:none; width:60px; height:60px; display:flex; align-items:center; justify-content:center;">
        <svg viewBox="0 0 24 24" width="48" height="48" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 2px white);">
            <line x1="12" y1="6" x2="12" y2="18"></line>
            <line x1="6" y1="12" x2="18" y2="12"></line>
            <circle cx="12" cy="12" r="2" fill="#2563eb"></circle>
        </svg>
    </div>

    <div id="coords-display">UTM: --</div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
